<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Milton Gamboa - IA & Estadística</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker listo'))
            .catch(err => console.log('Error en SW', err));
        });
      }
    </script>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <!-- CodeMirror y Recursos de Autocompletado -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/hint/show-hint.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/hint/show-hint.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; overflow: hidden; }
        
        header { 
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); 
            color: white; padding: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 10;
        }
        header h1 { margin: 0; font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        header p { margin: 3px 0 0; font-size: 0.85rem; color: #ffffff; opacity: 0.9; }

        #status { font-size: 11px; background: #f1c40f; padding: 4px; text-align: center; font-weight: bold; color: #000; text-transform: uppercase; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .panel-editor { display: flex; flex-direction: column; width: 50%; border-right: 2px solid #333; background: #282a36; }
        .CodeMirror { flex: 1; font-size: 16px; height: auto !important; border-bottom: 1px solid #444; }
        
        /* Estilo personalizado para el menú de sugerencias */
        .CodeMirror-hints { background: #2c3e50 !important; border: 1px solid #444 !important; border-radius: 5px; color: white !important; font-size: 14px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .CodeMirror-hint-active { background: #3498db !important; color: white !important; }

        /* CONTROLES */
        .controls-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #111; gap: 8px; }
        #run-btn { 
            flex: 1; background: #27ae60; color: white; border: none; padding: 14px; 
            font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; 
            font-size: 13px; transition: all 0.2s; box-shadow: 0 4px 0 #1e8449;
        }
        #run-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }
        #run-btn:disabled { background: #7f8c8d; box-shadow: none; opacity: 0.6; }

        /* MENÚ DESPLEGABLE */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { background: #34495e; color: white; padding: 12px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .dropdown-content {
            display: none; position: absolute; bottom: 55px; right: 0;
            background-color: #2c3e50; min-width: 220px; box-shadow: 0px -8px 25px rgba(0,0,0,0.6);
            z-index: 100; border-radius: 8px; overflow: hidden; border: 1px solid #444;
        }
        .dropdown-content button {
            color: #ecf0f1; padding: 14px 18px; text-decoration: none; display: block;
            width: 100%; border: none; background: none; text-align: left;
            cursor: pointer; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #3e4f5f;
        }
        .dropdown-content button:hover { background-color: #3498db; }
        .show { display: block; }

        /* SALIDA DE RESULTADOS */
        .panel-output { width: 50%; background: #fdfdfd; display: flex; flex-direction: column; overflow-y: auto; }
        .output-header { background: #eee; padding: 8px 15px; font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #ddd; }
        .output-content { padding: 25px; flex: 1; }
        #text-output { font-family: 'Consolas', monospace; font-size: 13px; color: #2c3e50; white-space: pre-wrap; line-height: 1.6; }
        #plot-container img { max-width: 100%; height: auto; border-radius: 10px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; overflow-y: auto; }
            .panel-editor, .panel-output { width: 100%; flex: none; }
            .CodeMirror { height: 350px !important; }
            .panel-output { min-height: 500px; border-top: 4px solid #333; }
            .dropdown-content { bottom: auto; top: 55px; } 
        }
    </style>
</head>
<body>

<header>
    <h1>MILTON GAMBOA</h1>
    <p>Estadística & Machine Learning</p>
</header>

<div id="status">Iniciando Suite de Inteligencia Artificial...</div>

<div class="main-container">
    <div class="panel-editor">
        <textarea id="editor"></textarea>
        
        <div class="controls-bar">
            <button id="run-btn" disabled onclick="runLab()">▶ Ejecutar Laboratorio</button>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu()">⋮</button>
                <div id="myDropdown" class="dropdown-content">
                    <button onclick="document.getElementById('file-upload').click()">📂 Cargar Datos (Excel/CSV)</button>
                    <button onclick="saveLocal()">💾 Guardar Progreso</button>
                    <button onclick="downloadCode()">📥 Exportar Código .PY</button>
                    <button onclick="clearConsole()" style="color: #e74c3c;">🗑 Limpiar Consola</button>
                </div>
            </div>
            <input type="file" id="file-upload" accept=".csv, .xlsx" style="display: none;">
        </div>
    </div>

    <div class="panel-output" id="out-panel">
        <div class="output-header">Consola de Resultados</div>
        <div class="output-content">
            <div id="text-output">Preparando entorno de Python...</div>
            <div id="plot-container"></div>
        </div>
    </div>
</div>

<script>
    // 1. Diccionario de Autocompletado Personalizado
    const miltonDictionary = [
        "numpy", "pandas", "matplotlib", "seaborn", "sklearn", "scipy", "stats", "plt", "sns", "np", "pd",
        "read_csv", "read_excel", "head", "tail", "info", "describe", "shape", "columns", "count",
        "mean", "median", "mode", "std", "var", "sum", "min", "max", "quantile", "skew", "kurtosis",
        "shapiro", "kstest", "normaltest", "anderson", "jarque_bera",
        "ttest_ind", "ttest_rel", "ttest_1samp", "anova", "chi2_contingency", "pearsonr", "spearmanr",
        "norm", "t", "f", "chi2", "expon", "binom", "poisson", "uniform",
        "histplot", "boxplot", "scatterplot", "barplot", "lineplot", "heatmap", "pairplot", "kdeplot", "qqplot",
        "dropna", "fillna", "groupby", "pivot_table", "iloc", "loc", "astype", "apply", "lambda",
        "input", "print", "float", "int", "range", "len", "append", "sorted", "fit", "predict",
        "train_test_split", "LinearRegression", "LogisticRegression", "KMeans"
    ].sort();

    function miltonHint(editor) {
        const cursor = editor.getCursor();
        const line = editor.getLine(cursor.line);
        const start = cursor.ch;
        const end = cursor.ch;
        let wordStart = start;
        while (wordStart > 0 && /[\w]/.test(line.charAt(wordStart - 1))) wordStart--;
        const currentWord = line.slice(wordStart, end);
        const list = miltonDictionary.filter(word => word.startsWith(currentWord.toLowerCase()));

        return {
            list: list,
            from: CodeMirror.Pos(cursor.line, wordStart),
            to: CodeMirror.Pos(cursor.line, end)
        };
    }

    // 2. Inicialización de CodeMirror
    const editorInstance = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "python", theme: "dracula", lineNumbers: true, matchBrackets: true, 
        autoCloseBrackets: true, indentUnit: 4, extraKeys: {"Ctrl-Space": "autocomplete"}
    });

    editorInstance.on("inputRead", function(cm, change) {
        if (change.text[0].match(/[a-z]/i)) {
            cm.showHint({ hint: miltonHint, completeSingle: false });
        }
    });

    const savedCode = localStorage.getItem('milton_lab_save');
    if (savedCode) { editorInstance.setValue(savedCode); }

    const textOutput = document.getElementById("text-output");
    const plotContainer = document.getElementById("plot-container");
    const runBtn = document.getElementById("run-btn");
    const statusMsg = document.getElementById("status");
    let pyodide;

    // 3. Funciones de Interfaz
    function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
    window.onclick = function(event) {
        if (!event.target.matches('.dropbtn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
            }
        }
    }

    function clearConsole() { textOutput.innerText = "Consola limpia."; plotContainer.innerHTML = ""; }
    function saveLocal() { localStorage.setItem('milton_lab_save', editorInstance.getValue()); alert("¡Progreso guardado!"); }
    function downloadCode() {
        const blob = new Blob([editorInstance.getValue()], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'laboratorio_milton_gamboa.py';
        a.click();
    }

    // 4. Lógica de Python
    async function initPython() {
        try {
            pyodide = await loadPyodide();
            await pyodide.loadPackage(["numpy", "pandas", "scipy", "matplotlib", "scikit-learn", "statsmodels", "micropip"]);
            const micropip = pyodide.pyimport("micropip");
            await micropip.install(["openpyxl", "seaborn"]);

            pyodide.runPython(`
                import builtins, js
                def custom_input(prompt=""): return js.prompt(prompt)
                builtins.input = custom_input
            `);

            statusMsg.innerText = "✅ SISTEMA LISTO - Colegio Brasilia Bosa";
            statusMsg.style.background = "#27ae60"; statusMsg.style.color = "white";
            runBtn.disabled = false;
            textOutput.innerText = "Entorno cargado correctamente.";
        } catch (e) {
            statusMsg.innerText = "❌ Error en carga";
        }
    }

    document.getElementById('file-upload').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const data = new Uint8Array(ev.target.result);
            pyodide.FS.writeFile(file.name, data);
            textOutput.innerText = `✅ DATOS CARGADOS: "${file.name}"`;
        };
        reader.readAsArrayBuffer(file);
    };

    async function runLab() {
        textOutput.innerText = ">>> Procesando cómputo...";
        runBtn.disabled = true;
        plotContainer.innerHTML = "";
        try {
            await pyodide.runPythonAsync(`
import sys, io, matplotlib.pyplot as plt, base64
plt.switch_backend('Agg')
sys.stdout = io.StringIO()
def get_plot():
    if plt.get_fignums():
        buf = io.BytesIO()
        plt.savefig(buf, format='png', bbox_inches='tight', dpi=120)
        buf.seek(0)
        img_str = base64.b64encode(buf.read()).decode('utf-8')
        plt.clf(); plt.close('all')
        return img_str
    return None
            `);
            await pyodide.runPythonAsync(editorInstance.getValue());
            const stdout = pyodide.runPython("sys.stdout.getvalue()");
            textOutput.innerText = stdout || "Cómputo finalizado correctamente.";
            const plotData = pyodide.runPython("get_plot()");
            if (plotData) {
                const img = document.createElement("img");
                img.src = "data:image/png;base64," + plotData;
                plotContainer.appendChild(img);
            }
            if (window.innerWidth <= 768) document.getElementById("out-panel").scrollIntoView({ behavior: 'smooth' });
        } catch (err) {
            textOutput.innerText = "❌ ERROR EN EL CÓDIGO:\n" + err;
        }
        runBtn.disabled = false;
    }

    initPython();
</script>
</body>
</html>
